<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selectra Share Server</title>
  <style>
    body { font-family: Segoe UI, sans-serif; background:#111; color:#eee; margin:0; padding:16px; }
    .card { border:1px solid #333; border-radius:8px; padding:12px; margin-bottom:12px; }
    label { display:block; margin-top:8px; font-size:12px; color:#bbb; }
    input { width:100%; padding:8px; margin-top:4px; border-radius:6px; border:1px solid #444; background:#1a1a1a; color:#eee; }
    button { padding:8px 12px; border:none; border-radius:6px; margin-right:8px; cursor:pointer; }
    #log { white-space:pre-wrap; color:#9fd; }
  </style>
</head>
<body>
  <h2>Selectra Share Server (最小版)</h2>

  <div class="card">
    <label>Shared Secret</label>
    <input id="secret" />
    <label>Port</label>
    <input id="port" type="number" value="9000" />
    <div style="margin-top:12px;">
      <button id="saveBtn" style="background:#4a8;">保存</button>
      <button id="startBtn" style="background:#357;">起動</button>
      <button id="stopBtn" style="background:#833;">停止</button>
    </div>
  </div>

  <div class="card">
    <div id="log">ready</div>
  </div>

  <script>
    const secret = document.getElementById('secret');
    const port = document.getElementById('port');
    const log = document.getElementById('log');

    async function init() {
      const s = await window.shareServer.getSettings();
      secret.value = s.secret || '';
      port.value = s.port || 9000;
      log.textContent = '設定を読み込みました';
    }

    document.getElementById('saveBtn').onclick = async () => {
      await window.shareServer.saveSettings({ secret: secret.value, port: Number(port.value || 9000) });
      log.textContent = '設定を保存しました';
    };

    document.getElementById('startBtn').onclick = async () => {
      const r = await window.shareServer.start();
      log.textContent = r.ok ? `起動しました (port=${r.port || port.value})` : `起動失敗: ${r.error}`;
    };

    document.getElementById('stopBtn').onclick = async () => {
      await window.shareServer.stop();
      log.textContent = '停止しました';
    };

    init();
  </script>
</body>
</html>
