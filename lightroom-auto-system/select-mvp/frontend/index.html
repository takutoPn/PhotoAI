<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selectra AI</title>
    <style>
      body { font-family: sans-serif; margin: 18px; background: #111; color: #eee; }
      h1 { margin-bottom: 8px; }
      .muted { color: #aaa; margin-bottom: 12px; }
      .card { border: 1px solid #333; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
      input, select { width: 100%; margin: 4px 0 10px; padding: 8px; background: #222; border: 1px solid #444; color: #fff; box-sizing: border-box; }
      button { background: #4a8; color: #fff; border: 0; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
      .dropzone { border: 2px dashed #555; border-radius: 8px; padding: 12px; margin-bottom: 10px; text-align: center; color: #bbb; cursor: pointer; user-select: none; }
      .dropzone.dragover { border-color: #4a8; color: #cfe; }
      .file-input-hidden { display: none; }
      .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
      .toolbar { display: grid; grid-template-columns: 180px 180px 1fr; gap: 10px; align-items: end; }
      .top-tabs { display:flex; gap:0; margin: 0 0 10px; border-bottom:1px solid #333; }
      .top-tab { background:#2a2a2a; border:1px solid #444; border-bottom:none; color:#ddd; padding:8px 14px; cursor:pointer; }
      .top-tab + .top-tab { border-left:none; }
      .top-tab.active { background:#4a8; color:#fff; }
      #gallery { display: grid; gap: 10px; }
      .item { border: 1px solid #2e2e2e; border-radius: 8px; overflow: hidden; background: #181818; }
      .item img { width: 100%; display: block; background: #000; max-height: 280px; object-fit: cover; }
      .meta { padding: 8px; font-size: 12px; }
      .stars button { margin-right: 6px; background: #333; }
      .stars button.active { background: #d18b00; }
      #output { white-space: pre-wrap; background: #1a1a1a; padding: 10px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>Selectra AI</h1>
    <div class="top-tabs">
      <button id="tabMainBtn" class="top-tab active" type="button">セレクト</button>
      <button id="tabLearningBtn" class="top-tab" type="button">学習取り込み</button>
    </div>

    <div class="card">
      <label>案件名</label>
      <input id="projectName" value="Wedding A" />

      <label>Catalogファイル (.lrcat)</label>
      <div id="dropzone" class="dropzone" title="クリック/ダブルクリックでファイル選択">
        ここに .lrcat をドラッグ&ドロップ<br/>またはクリックしてファイルを選択
      </div>
      <input id="catalogFile" class="file-input-hidden" type="file" accept=".lrcat" />
      <input id="catalogPath" placeholder="選択されたパスが入ります" />

      <div class="row">
        <div><label>最終セレクト枚数</label><input id="targetPicks" type="number" value="30" min="1" /></div>
        <div><label>1人あたり上限</label><input id="maxPerPerson" type="number" value="3" min="1" /></div>
        <div><label>1クラスタ上限</label><input id="maxPerCluster" type="number" value="1" min="1" /></div>
      </div>

      <div class="row" style="margin-top:8px; grid-template-columns: 1fr 1fr 1fr;">
        <div>
          <label>書き出し: セレクト済み</label>
          <select id="exportSelectedStar">
            <option value="5">★5</option><option value="4">★4</option><option value="3" selected>★3</option><option value="2">★2</option><option value="1">★1</option><option value="0">★0</option>
          </select>
        </div>
        <div>
          <label>書き出し: 次点</label>
          <select id="exportReserveStar">
            <option value="5">★5</option><option value="4">★4</option><option value="3">★3</option><option value="2">★2</option><option value="1" selected>★1</option><option value="0">★0</option>
          </select>
        </div>
        <div>
          <label>書き出し: 非採用</label>
          <select id="exportRejectStar">
            <option value="5">★5</option><option value="4">★4</option><option value="3">★3</option><option value="2">★2</option><option value="1">★1</option><option value="0" selected>★0</option>
          </select>
        </div>
      </div>

      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:8px;">
        <button id="runBtn">ジョブ作成して実行（表示のみ）</button>
        <button id="saveBtn" type="button" style="background:#c85;">評価をCatalogに保存</button>
        <button id="learnBtn" type="button" style="background:#56a;">学習データに追加</button>
        <label style="display:flex; align-items:center; gap:6px; color:#ddd;">
          <input id="openLightroomAfterExport" type="checkbox" checked style="width:auto; margin:0;" />
          保存後にLightroomでCatalogを開く
        </label>
      </div>
      <div style="margin-top:10px;">
        <div id="tabMain" style="display:block;">
          <label style="display:flex; align-items:center; gap:6px; color:#ddd; margin-bottom:8px;">
            <input id="shareLearningDataMain" type="checkbox" style="width:auto; margin:0;" />
            ※ 任意 学習データを共有する
          </label>
          <div class="muted" style="margin-bottom:8px;">※ 写真データはアップロードされません。匿名化済み学習イベントのみ対象です。外部共有は行いません。</div>
        </div>

        <div id="tabLearning" style="display:none;">
          <label style="display:flex; align-items:center; gap:6px; color:#ddd; margin-bottom:8px;">
            <input id="shareLearningDataHistory" type="checkbox" style="width:auto; margin:0;" />
            ※ 任意 学習データを共有する
          </label>
          <div class="muted" style="margin-bottom:8px;">※ 写真データはアップロードされません。匿名化済み学習イベントのみ対象です。外部共有は行いません。</div>
          <label>学習取り込み用Catalog (.lrcat)</label>
          <div id="historyDropzone" class="dropzone" title="クリック/ダブルクリックでファイル選択">
            ここに過去 .lrcat をドラッグ&ドロップ<br/>またはクリックしてファイルを選択
          </div>
          <input id="historyCatalogFile" class="file-input-hidden" type="file" accept=".lrcat" />
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:8px;">
            <input id="historyCatalogPath" placeholder="過去Catalog(.lrcat)のパスを指定" style="max-width:520px;" />
            <button id="importHistoryBtn" type="button" style="background:#468;">過去セレクト/レタッチ履歴を学習に取り込む</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card toolbar" style="grid-template-columns: 180px 180px 220px 1fr;">
      <div>
        <label>表示フィルタ</label>
        <select id="starFilter">
          <option value="all">全件</option>
          <option value="3">★3のみ</option>
          <option value="1">★1のみ</option>
          <option value="0">★0のみ</option>
          <option value="1plus">★1以上</option>
          <option value="3plus">★3のみ(採用)</option>
        </select>
      </div>
      <div>
        <label>1行の枚数</label>
        <select id="columns">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6" selected>6</option>
        </select>
      </div>
      <div>
        <label>並び順</label>
        <select id="sortBy">
          <option value="star" selected>星順(デフォルト)</option>
          <option value="date">撮影日順</option>
          <option value="name">お名前順</option>
          <option value="format">ファイル形式順</option>
        </select>
      </div>
      <div id="summary" class="muted"></div>
    </div>

    <div id="gallery"></div>
    <div style="margin: 10px 0 16px; text-align: center;">
      <button id="loadMoreBtn" style="display:none; background:#2f6; color:#111;">さらに表示</button>
    </div>

    <div class="card">
      <h3>ログ</h3>
      <div id="output">まだ実行されていません。</div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
